<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Our Exciting New Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ffffff;
            --accent-color: #3b82f6; /* Modern Blue */
            --text-main: #ffffff;
            --text-muted: #e2e8f0;
            --glass-bg: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&q=80&w=2072') no-repeat center center/cover;
            color: var(--text-main);
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 3rem;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            text-transform: uppercase;
            color: var(--accent-color);
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            font-weight: 700;
            line-height: 1.1;
        }

        p {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .signup-form {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        input[type="email"] {
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            width: 100%;
            max-width: 300px;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="email"]:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--accent-color);
        }

        button {
            padding: 15px 30px;
            border-radius: 12px;
            border: none;
            background: var(--accent-color);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.3s ease;
        }

        button:hover {
            background: #2563eb;
            transform: scale(1.05);
        }

        .social-links {
            margin-top: 3rem;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: var(--accent-color);
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            h1 { font-size: 2.5rem; }
            .signup-form { flex-direction: column; }
            input[type="email"] { max-width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">Pratik News</div>
        <h1>Something great is on its way.</h1>
        <p>We're working hard to finish the development of our new site. Sign up below to be the first to know when we go live.</p>
        
        <form class="signup-form" action="#" method="POST">
            <input type="email" placeholder="Enter your email" required>
            <button type="submit">Notify Me</button>
        </form>

        <div class="social-links">
            <a href="https://x.com/prateektimsina">Twitter</a>
            <a href="https://www.instagram.com/prateektimsina/">Instagram</a>
            <a href="#">LinkedIn</a>
        </div>
    </div>

</body>
</html>
